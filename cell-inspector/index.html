<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cell Inspector</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');
    body, body * { color: #000 !important; text-shadow: none !important; }
    
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #1A237E; /* Deep space/microscope blue */
      font-family: 'Nunito', sans-serif;
      overflow: hidden; touch-action: none;
      color: white;
    }

    #game-container {
      position: relative; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    #hud {
      position: absolute; top: 20px; left: 0; width: 100%;
      display: flex; justify-content: center; z-index: 10;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 20px;
      padding: 15px 30px; text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    #prompt { font-size: 32px; color: #00E676; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    #subtitle { font-size: 18px; color: #B0BEC5; }

    #cell-container {
      width: 90%; max-width: 600px; height: 90%; max-height: 600px;
      position: relative; animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(2deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    .organelle {
      cursor: pointer; transition: all 0.3s;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
    }
    .organelle:hover { filter: drop-shadow(0 0 15px rgba(255,255,255,0.8)) brightness(1.2); transform: scale(1.05); }
    .organelle.found { filter: grayscale(0) drop-shadow(0 0 20px #00E676); pointer-events: none; }

    .overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); display: none; flex-direction: column;
      justify-content: center; align-items: center; z-index: 100;
    }
    .overlay h1 { font-size: 50px; color: #00E676; margin: 0; }
    .overlay p { font-size: 24px; max-width: 600px; text-align: center; line-height: 1.5; }
    .overlay button {
      margin-top: 20px; padding: 15px 40px; font-size: 24px; font-family: 'Nunito';
      background: #2962FF; color: white; border: none; border-radius: 30px;
      cursor: pointer; box-shadow: 0 8px 0 #1565C0; font-weight: bold;
    }
    .overlay button:active { transform: translateY(8px); box-shadow: 0 0 0 #1565C0; }

  </style>
</head>
<body>
  <div id="game-container">
    <div id="hud">
      <div class="glass-panel">
        <div id="subtitle">Find the organelle:</div>
        <div id="prompt">Nucleus</div>
      </div>
    </div>

    <div id="cell-container">
      <svg viewBox="0 0 500 500" width="100%" height="100%">
        <!-- Cell Membrane & Cytoplasm -->
        <circle cx="250" cy="250" r="230" fill="#E1BEE7" stroke="#8E24AA" stroke-width="10"/>
        
        <!-- Nucleus -->
        <g id="nucleus" class="organelle" data-name="Nucleus" data-desc="The control center of the cell that contains DNA.">
          <circle cx="250" cy="250" r="70" fill="#7B1FA2"/>
          <circle cx="230" cy="230" r="20" fill="#4A148C"/>
        </g>

        <!-- Mitochondria -->
        <g id="mitochondria" class="organelle" data-name="Mitochondria" data-desc="The powerhouse of the cell, generating energy." transform="translate(100, 150) rotate(45)">
          <ellipse cx="0" cy="0" rx="40" ry="20" fill="#FF7043"/>
          <path d="M -30 0 Q -15 -10 0 0 T 30 0" fill="none" stroke="#D84315" stroke-width="4"/>
        </g>
        <g class="organelle" data-name="Mitochondria" data-desc="The powerhouse of the cell, generating energy." transform="translate(350, 320) rotate(-30)">
          <ellipse cx="0" cy="0" rx="40" ry="20" fill="#FF7043"/>
          <path d="M -30 0 Q -15 -10 0 0 T 30 0" fill="none" stroke="#D84315" stroke-width="4"/>
        </g>

        <!-- Vacuole -->
        <g id="vacuole" class="organelle" data-name="Vacuole" data-desc="Stores water, nutrients, and waste products.">
          <ellipse cx="360" cy="160" rx="60" ry="40" fill="#81D4FA" stroke="#039BE5" stroke-width="3"/>
        </g>

        <!-- Endoplasmic Reticulum -->
        <g id="er" class="organelle" data-name="Endoplasmic Reticulum" data-desc="A network of membranes that helps make and transport proteins.">
          <path d="M 170 200 Q 140 150 160 100 Q 180 120 190 180" fill="none" stroke="#26A69A" stroke-width="15" stroke-linecap="round"/>
          <path d="M 150 240 Q 100 230 110 180" fill="none" stroke="#26A69A" stroke-width="15" stroke-linecap="round"/>
          <path d="M 160 280 Q 110 320 150 360" fill="none" stroke="#26A69A" stroke-width="15" stroke-linecap="round"/>
        </g>

        <!-- Golgi Apparatus -->
        <g id="golgi" class="organelle" data-name="Golgi Apparatus" data-desc="Packages and ships proteins around the cell.">
          <path d="M 200 380 Q 250 430 300 380" fill="none" stroke="#FFA726" stroke-width="12" stroke-linecap="round"/>
          <path d="M 210 400 Q 250 440 290 400" fill="none" stroke="#FFA726" stroke-width="12" stroke-linecap="round"/>
          <path d="M 220 420 Q 250 450 280 420" fill="none" stroke="#FFA726" stroke-width="12" stroke-linecap="round"/>
        </g>
      </svg>
    </div>

    <div id="info-screen" class="overlay">
      <h1 id="info-title">Found It!</h1>
      <p id="info-desc">Description goes here.</p>
      <button onclick="nextOrganelle()">Continue</button>
    </div>

    <div id="win-screen" class="overlay">
      <h1>Cell Master!</h1>
      <p>You found all the organelles.</p>
      <button onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script>
    const organelles = ['Nucleus', 'Mitochondria', 'Vacuole', 'Endoplasmic Reticulum', 'Golgi Apparatus'];
    let remaining = [...organelles].sort(() => 0.5 - Math.random());
    let currentTarget = remaining.pop();

    document.getElementById('prompt').innerText = currentTarget;

    document.querySelectorAll('.organelle').forEach(el => {
      el.addEventListener('click', function() {
        if(this.dataset.name === currentTarget) {
          // Correct!
          this.classList.add('found');
          document.getElementById('info-title').innerText = `You found the ${currentTarget}!`;
          document.getElementById('info-desc').innerText = this.dataset.desc;
          document.getElementById('info-screen').style.display = 'flex';
        } else {
          // Wrong shake
          document.getElementById('cell-container').animate([
            { transform: 'translateX(-10px)' },
            { transform: 'translateX(10px)' },
            { transform: 'translateX(0)' }
          ], { duration: 200 });
        }
      });
    });

    function nextOrganelle() {
      document.getElementById('info-screen').style.display = 'none';
      if(remaining.length > 0) {
        currentTarget = remaining.pop();
        document.getElementById('prompt').innerText = currentTarget;
      } else {
        document.getElementById('win-screen').style.display = 'flex';
      }
    }
  </script>
</body>
</html>
